services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=8001
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - LANGGRAPH_BACKEND_URL=http://server:8001
    depends_on:
      - server
    restart: unless-stopped
