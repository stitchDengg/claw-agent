<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-primary-container": "#000000",
                        "tertiary-fixed-dim": "#46464e",
                        "surface-dim": "#131315",
                        "on-primary-fixed": "#ffffff",
                        "surface-container-highest": "#353437",
                        "surface-bright": "#39393b",
                        "background": "#09090b",
                        "inverse-surface": "#e5e1e4",
                        "surface-tint": "#c6c6c7",
                        "tertiary-fixed": "#5d5e66",
                        "primary": "#ffffff",
                        "on-background": "#e5e1e4",
                        "surface-container-lowest": "#0e0e10",
                        "secondary-container": "#45464e",
                        "on-secondary-fixed-variant": "#3a3b42",
                        "on-secondary-container": "#e2e1eb",
                        "on-secondary": "#1a1b22",
                        "primary-fixed-dim": "#454747",
                        "on-tertiary-container": "#000000",
                        "tertiary-container": "#909099",
                        "on-error": "#690005",
                        "on-surface": "#e5e1e4",
                        "surface": "#09090b",
                        "primary-container": "#d4d4d4",
                        "surface-variant": "#111113",
                        "on-surface-variant": "#c6c6c6",
                        "on-tertiary-fixed-variant": "#e3e1ec",
                        "surface-container-high": "#18181b",
                        "secondary-fixed": "#c6c6cf",
                        "error": "#ffb4ab",
                        "on-tertiary-fixed": "#ffffff",
                        "on-secondary-fixed": "#1a1b22",
                        "outline-variant": "#27272a",
                        "outline": "#3f3f46",
                        "tertiary": "#e3e1ec",
                        "surface-container-low": "#0c0c0e",
                        "inverse-on-surface": "#313032",
                        "error-container": "#93000a",
                        "secondary": "#c6c6cf",
                        "on-primary": "#1a1c1c",
                        "secondary-fixed-dim": "#aaaab3",
                        "inverse-primary": "#5d5f5f",
                        "primary-fixed": "#5d5f5f",
                        "on-tertiary": "#1a1b22",
                        "on-primary-fixed-variant": "#e2e2e2",
                        "surface-container": "#111113",
                        "on-error-container": "#ffdad6"
                    },
                    fontFamily: {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            background-color: #09090b;
            color: #fafafa;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .sidebar-width { width: 260px; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        .letter-spacing-tight { letter-spacing: -0.02em; }
        .letter-spacing-wide { letter-spacing: 0.05em; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
<!-- LEFT SIDEBAR -->
<aside class="sidebar-width bg-surface-container-low flex flex-col h-full border-r border-outline-variant/30">
<!-- Sidebar Header -->
<div class="p-4 space-y-4">
<div class="flex items-center justify-between">
<span class="text-zinc-200 text-sm font-semibold tracking-tight">Claw Agent</span>
<span class="material-symbols-outlined text-zinc-500 text-[20px]">edit_square</span>
</div>
<button class="w-full flex items-center justify-center gap-2 py-2 px-4 bg-surface-container-high border border-outline-variant rounded-lg text-[13px] text-zinc-400 hover:bg-zinc-800 transition-colors duration-200">
<span class="material-symbols-outlined text-[16px]">add</span>
<span>New Chat</span>
</button>
</div>
<!-- Sidebar Content (Scrollable) -->
<nav class="flex-1 overflow-y-auto px-2 custom-scrollbar">
<div class="mt-6 mb-2 px-2 text-[11px] font-bold text-zinc-500 uppercase tracking-[0.1em]">History</div>
<div class="space-y-1">
<a class="flex items-center px-2 py-2 text-[13px] text-zinc-400 rounded-sm bg-surface-container-high text-zinc-50 font-medium" href="#">
<span class="truncate">React 性能优化讨论</span>
</a>
<a class="flex items-center px-2 py-2 text-[13px] text-zinc-400 rounded-sm hover:bg-surface-container-high hover:text-zinc-200 transition-colors" href="#">
<span class="truncate">API 设计方案</span>
</a>
<a class="flex items-center px-2 py-2 text-[13px] text-zinc-400 rounded-sm hover:bg-surface-container-high hover:text-zinc-200 transition-colors" href="#">
<span class="truncate">Python 数据分析</span>
</a>
<a class="flex items-center px-2 py-2 text-[13px] text-zinc-400 rounded-sm hover:bg-surface-container-high hover:text-zinc-200 transition-colors" href="#">
<span class="truncate">UI 设计规范 v2</span>
</a>
</div>
</nav>
<!-- Sidebar Footer -->
<div class="p-4 border-t border-outline-variant/50">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center text-[12px] font-medium text-zinc-400">
                        张
                    </div>
<span class="text-[13px] text-zinc-200 font-medium">张明</span>
</div>
<button class="p-1 text-zinc-500 hover:text-zinc-200 transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="settings">settings</span>
</button>
</div>
<div class="mt-4">
<button class="w-full py-2 text-[11px] font-bold uppercase tracking-widest text-zinc-500 border border-zinc-800 rounded-sm hover:bg-zinc-900 transition-colors">
                    Upgrade to Pro
                </button>
</div>
</div>
</aside>
<!-- MAIN AREA -->
<main class="flex-1 flex flex-col bg-surface relative overflow-hidden">
<!-- Top Nav (Mobile Hidden) -->
<header class="h-14 flex items-center justify-between px-8 w-full md:hidden bg-surface-container-low border-b border-outline-variant/30">
<div class="text-sm font-black tracking-widest uppercase text-zinc-50">Claw Agent</div>
<div class="flex gap-4">
<span class="material-symbols-outlined text-zinc-50" data-icon="share">share</span>
<span class="material-symbols-outlined text-zinc-50" data-icon="more_vert">more_vert</span>
</div>
</header>
<!-- Center Content -->
<div class="flex-1 flex flex-col items-center justify-center px-6">
<div class="w-full max-w-[640px] space-y-12">
<!-- Greeting -->
<div class="space-y-4 text-center md:text-left">
<h1 class="text-[32px] font-semibold text-zinc-50 leading-tight tracking-tight">你好，有什么我可以帮你的？</h1>
<p class="text-[15px] text-zinc-500 font-light">选择下方话题开始，或直接输入你的问题。</p>
</div>
<!-- Bento Grid Actions -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Card 1 -->
<button class="group flex flex-col p-6 bg-surface-container rounded-xl text-left border border-transparent hover:bg-surface-container-high hover:border-outline-variant transition-all duration-300">
<div class="mb-4">
<span class="material-symbols-outlined text-zinc-200 text-[24px]" data-icon="terminal">terminal</span>
</div>
<h3 class="text-[14px] font-semibold text-zinc-200 mb-1">编写代码</h3>
<p class="text-[13px] text-zinc-500">帮你编写高质量的代码</p>
</button>
<!-- Card 2 -->
<button class="group flex flex-col p-6 bg-surface-container rounded-xl text-left border border-transparent hover:bg-surface-container-high hover:border-outline-variant transition-all duration-300">
<div class="mb-4">
<span class="material-symbols-outlined text-zinc-200 text-[24px]" data-icon="lightbulb">lightbulb</span>
</div>
<h3 class="text-[14px] font-semibold text-zinc-200 mb-1">技术方案</h3>
<p class="text-[13px] text-zinc-500">设计完善的技术架构方案</p>
</button>
<!-- Card 3 -->
<button class="group flex flex-col p-6 bg-surface-container rounded-xl text-left border border-transparent hover:bg-surface-container-high hover:border-outline-variant transition-all duration-300">
<div class="mb-4">
<span class="material-symbols-outlined text-zinc-200 text-[24px]" data-icon="description">description</span>
</div>
<h3 class="text-[14px] font-semibold text-zinc-200 mb-1">文档生成</h3>
<p class="text-[13px] text-zinc-500">自动生成项目文档</p>
</button>
<!-- Card 4 -->
<button class="group flex flex-col p-6 bg-surface-container rounded-xl text-left border border-transparent hover:bg-surface-container-high hover:border-outline-variant transition-all duration-300">
<div class="mb-4">
<span class="material-symbols-outlined text-zinc-200 text-[24px]" data-icon="bolt">bolt</span>
</div>
<h3 class="text-[14px] font-semibold text-zinc-200 mb-1">代码优化</h3>
<p class="text-[13px] text-zinc-500">优化代码性能和质量</p>
</button>
</div>
</div>
</div>
<!-- BOTTOM INPUT AREA -->
<div class="w-full flex flex-col items-center pb-8 px-6">
<div class="w-full max-w-[640px] relative">
<div class="w-full bg-surface-container border border-outline-variant rounded-2xl h-[56px] flex items-center px-4 gap-3 focus-within:border-zinc-600 transition-colors">
<input class="flex-1 bg-transparent border-none text-[15px] text-zinc-200 placeholder:text-zinc-700 focus:ring-0 outline-none" placeholder="输入消息..." type="text"/>
<div class="flex items-center gap-2">
<button class="w-9 h-9 rounded-full bg-zinc-800/50 flex items-center justify-center text-zinc-500 hover:text-zinc-200 hover:bg-zinc-800 transition-all">
<span class="material-symbols-outlined text-[20px]">attach_file</span>
</button>
<button class="w-9 h-9 rounded-full bg-outline-variant flex items-center justify-center text-zinc-400 hover:bg-zinc-700 hover:text-zinc-100 transition-all">
<span class="material-symbols-outlined text-[20px]">arrow_upward</span>
</button>
</div>
</div>
<p class="mt-3 text-center text-[11px] text-zinc-700 tracking-wide">
                    Claw Agent 可能会犯错，请核实重要信息。
                </p>
</div>
</div>
</main>
<!-- Mobile Bottom Nav -->
<nav class="fixed bottom-0 left-0 right-0 h-16 bg-surface-container-low md:hidden flex items-center justify-around border-t border-outline-variant/30">
<button class="flex flex-col items-center text-zinc-50">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
<span class="text-[10px] mt-1">Chat</span>
</button>
<button class="flex flex-col items-center text-zinc-500">
<span class="material-symbols-outlined">history</span>
<span class="text-[10px] mt-1">History</span>
</button>
<button class="flex flex-col items-center text-zinc-500">
<span class="material-symbols-outlined">folder_open</span>
<span class="text-[10px] mt-1">Collections</span>
</button>
<button class="flex flex-col items-center text-zinc-500">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] mt-1">Settings</span>
</button>
</nav>
</body></html>
